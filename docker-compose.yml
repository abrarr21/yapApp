services:
  mongo:
    image: mongo:7
    container_name: yapApp-db
    ports:
      - 9000:27017
    volumes:
      - yapApp-db:/data/db

  backend:
    build: ./server
    container_name: server
    environment:
      CI: "true"
    ports:
      - 6969:6969
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - yapApp_node_modules:/app/node_modules
    command: "pnpm run dev"

  frontend:
    build: ./client
    container_name: client
    environment:
      CI: "true"
    ports:
      - 5173:5173
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - yapApp_node_modules_frontend:/app/node_modules
    command: "pnpm run dev"

  redis:
      image: redis:7-alpine
      container_name: redis-cache
      restart: unless-stopped
      ports:
        - "6379:6379"
      volumes:
        - yapApp_redis_data:/data
      command: redis-server --requirepass MySecurePassword123 --appendonly yes
      healthcheck:
        test: ["CMD", "redis-cli", "-a", "MySecurePassword123", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

volumes:
  yapApp-db:
  yapApp_node_modules:
  yapApp_node_modules_frontend:
  yapApp_redis_data:
